name: Quality and Security Checks

on:
  push:
    branches: [ dev ]

permissions: {}

jobs:
  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.2'
          tools: cs2pr

      - name: Install PHPCS
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require wp-coding-standards/wpcs dealerdirect/phpcodesniffer-composer-installer phpcompatibility/phpcompatibility-wp
          echo "$(composer global config bin-dir)" >> $GITHUB_PATH

      - name: Run PHPCS
        run: |
          set -o pipefail
          phpcs --standard=phpcs.xml.dist --extensions=php --ignore=vendor/*,tests/* --report=checkstyle mxroute-mailer.php includes/ admin/ uninstall.php | cs2pr

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        php: ['7.3', '7.4', '8.0', '8.1', '8.2', '8.3']

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  codeql:
    name: Security - CodeQL Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: actions

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          category: "/language:actions"

  semgrep:
    name: Security - PHP Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@b991d6daac5c5aef564edac7a0ed685c387d3738
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
            p/php
          generateSarif: "1"

  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: [phpcs, phpunit, codeql, semgrep]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build zip
        run: |
          zip -r mxroute-mailer.zip . \
            -x ".git/*" \
            -x "tests/*" \
            -x "vendor/*" \
            -x "composer.*" \
            -x "phpunit.xml" \
            -x "phpcs.xml.dist" \
            -x ".github/*" \
            -x ".phpunit.result.cache" \
            -x "*.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mxroute-mailer-${{ github.ref_name }}-${{ github.run_id }}
          path: mxroute-mailer.zip
          retention-days: 30
