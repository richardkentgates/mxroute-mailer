name: CI

on:
  push:
    branches: [ dev, test, main ]
  pull_request:
    branches: [ dev, test, main ]

permissions: {}

jobs:
  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.2'
          tools: cs2pr

      - name: Install PHPCS
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require wp-coding-standards/wpcs dealerdirect/phpcodesniffer-composer-installer phpcompatibility/phpcompatibility-wp
          echo "$(composer global config bin-dir)" >> $GITHUB_PATH

      - name: Run PHPCS
        run: phpcs --standard=phpcs.xml.dist --extensions=php --ignore=vendor/*,tests/* --report=checkstyle mxroute-mailer.php includes/ admin/ uninstall.php | cs2pr

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        php: ['7.3', '7.4', '8.0', '8.1', '8.2', '8.3']

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  build:
    name: Build Test Zip
    runs-on: ubuntu-latest
    needs: [phpcs, phpunit]
    if: github.ref == 'refs/heads/test' && github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build zip
        run: |
          zip -r mxroute-mailer-test.zip . \
            -x ".git/*" \
            -x "tests/*" \
            -x "vendor/*" \
            -x "composer.*" \
            -x "phpunit.xml" \
            -x "phpcs.xml.dist" \
            -x ".github/*" \
            -x ".phpunit.result.cache" \
            -x "*.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mxroute-mailer-test
          path: mxroute-mailer-test.zip
          retention-days: 30
