name: Quality and Security Checks

on:
  push:
    branches: [ dev ]

permissions: {}

jobs:
  php-lint:
    name: PHP Syntax Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.2'

      - name: Lint PHP files
        run: |
          find . -type f -name '*.php' ! -path './vendor/*' -exec php -l {} \; | tee /tmp/php-lint.log
          if grep -q "Errors parsing" /tmp/php-lint.log; then
            exit 1
          fi

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        php: ['7.3', '7.4', '8.0', '8.1', '8.2', '8.3']

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Download PHPUnit PHAR
        run: |
          curl -sL -o phpunit.phar https://phar.phpunit.de/phpunit-9.phar
          chmod +x phpunit.phar
          php phpunit.phar --version

      - name: Run PHPUnit
        run: php phpunit.phar --configuration phpunit.xml

  security-scan:
    name: Security - CodeQL & PHP Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: actions

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          category: "/language:actions"

      - name: Run Semgrep PHP security scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
            p/php

  security-scorecard:
    name: Security - OSSF Scorecard Replacement
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install zizmor
        run: pip install zizmor

      - name: Run zizmor on workflow files
        run: zizmor --format sarif .github/workflows > results.sarif

      - name: Check for unpinned Actions references
        run: |
          unpinned=$(grep -R "uses:" .github/workflows | grep -vE '@[0-9a-f]{40}' || true)
          if [[ -n "$unpinned" ]]; then
            echo "::error::Unpinned Actions references found:"
            echo "$unpinned"
            exit 1
          fi

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        if: always() && hashFiles('results.sarif') != ''
        with:
          sarif_file: results.sarif

  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: [php-lint, phpunit, security-scan]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build zip
        run: |
          zip -r mxroute-mailer.zip . \
            -x ".git/*" \
            -x "tests/*" \
            -x "vendor/*" \
            -x "phpunit.xml" \
            -x "phpcs.xml.dist" \
            -x ".github/*" \
            -x ".phpunit.result.cache" \
            -x "*.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mxroute-mailer-${{ github.ref_name }}-${{ github.run_id }}
          path: mxroute-mailer.zip
          retention-days: 30
