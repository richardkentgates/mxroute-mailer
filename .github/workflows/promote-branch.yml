name: Promote

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target branch'
        required: true
        type: choice
        options:
          - test
          - main

permissions: {}

jobs:
  create-pr:
    name: Create Promotion PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Check for existing PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --repo "${{ github.repository }}" --head ${{ github.ref_name }} --base ${{ inputs.target }} --state open --json number --jq '.[0].number')
          echo "existing=$existing" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.check.outputs.existing == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ inputs.target }}
          HEAD: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh pr create \
            --repo "$REPO" \
            --head "$HEAD" \
            --base "$TARGET" \
            --title "Promote $HEAD to $TARGET" \
            --body "Automated promotion from $HEAD to $TARGET. Checks required: PHPCS + PHPUnit."

      - name: PR already exists
        if: steps.check.outputs.existing != ''
        env:
          EXISTING: ${{ steps.check.outputs.existing }}
        run: |
          echo "Open PR already exists: number $EXISTING"
