name: Promote

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target branch'
        required: true
        type: choice
        options:
          - test
          - main

permissions: {}

jobs:
  validate:
    name: Validate Promotion
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Check source and target branches
        env:
          HEAD: ${{ github.ref_name }}
          TARGET: ${{ inputs.target }}
        run: |
          if [[ "$HEAD" == "$TARGET" ]]; then
            echo "::error::Cannot promote a branch to itself ($HEAD -> $TARGET)"
            exit 1
          fi

          case "$HEAD:$TARGET" in
            dev:test|test:main)
              echo "Promotion path is valid: $HEAD -> $TARGET"
              ;;
            *)
              echo "::error::Invalid promotion path: $HEAD -> $TARGET. Only dev -> test and test -> main are allowed."
              exit 1
              ;;
          esac

  create-pr:
    name: Create Promotion PR
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Check for existing PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD: ${{ github.ref_name }}
          TARGET: ${{ inputs.target }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh pr list --repo "$REPO" --head "$HEAD" --base "$TARGET" --state open --json number --jq '.[0].number')
          echo "existing=$existing" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.check.outputs.existing == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET: ${{ inputs.target }}
          HEAD: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh pr create \
            --repo "$REPO" \
            --head "$HEAD" \
            --base "$TARGET" \
            --title "Promote $HEAD to $TARGET" \
            --body "Automated promotion from \`$HEAD\` to \`$TARGET\`.

          **Required checks before merge:**
          - PHPCS
          - PHPUnit (PHP 7.3-8.3)"

      - name: PR already exists
        if: steps.check.outputs.existing != ''
        env:
          EXISTING: ${{ steps.check.outputs.existing }}
        run: |
          echo "Open PR already exists: #$EXISTING"
