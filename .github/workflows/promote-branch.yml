name: Promote

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target branch'
        required: true
        type: choice
        options:
          - test
          - main

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate Promotion
    runs-on: ubuntu-latest
    steps:
      - name: Check source and target branches
        env:
          HEAD: ${{ github.ref_name }}
          TARGET: ${{ inputs.target }}
        run: |
          if [[ "$HEAD" == "$TARGET" ]]; then
            echo "::error::Cannot promote a branch to itself ($HEAD -> $TARGET)"
            exit 1
          fi

          case "$HEAD:$TARGET" in
            dev:test|test:main)
              echo "Promotion path is valid: $HEAD -> $TARGET"
              ;;
            *)
              echo "::error::Invalid promotion path: $HEAD -> $TARGET. Only dev -> test and test -> main are allowed."
              exit 1
              ;;
          esac

  promote:
    name: Promote and Merge
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Find or create promotion PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD: ${{ github.ref_name }}
          TARGET: ${{ inputs.target }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh pr list --repo "$REPO" --head "$HEAD" --base "$TARGET" --state open --json number --jq '.[0].number')
          if [[ -n "$existing" && "$existing" != "null" ]]; then
            echo "number=$existing" >> "$GITHUB_OUTPUT"
            echo "Using existing PR #$existing"
          else
            pr_url=$(gh pr create \
              --repo "$REPO" \
              --head "$HEAD" \
              --base "$TARGET" \
              --title "Promote $HEAD to $TARGET" \
              --body "Automated promotion from \`$HEAD\` to \`$TARGET\`.")
            number=$(echo "$pr_url" | sed 's/.*\/pull\/\([0-9]*\)$/\1/')
            echo "number=$number" >> "$GITHUB_OUTPUT"
            echo "Created PR #$number"
          fi

      - name: Merge promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "$REPO" --merge
          echo "PR #$PR_NUMBER merged. Promotion complete."

      - name: Tag release on main
        if: github.ref_name == 'test' && inputs.target == 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main
          git checkout main
          version=$(grep -oP "Version:\\s*\\K[0-9.]+" mxroute-mailer.php | head -1)
          tag="v$version"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
          echo "Created release tag $tag"

  build-test:
    name: Build Test Artifact
    runs-on: ubuntu-latest
    needs: promote
    if: github.ref_name == 'dev' && inputs.target == 'test'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: test

      - name: Build test zip
        run: |
          zip -r mxroute-mailer-test.zip . \
            -x ".git/*" \
            -x "tests/*" \
            -x "vendor/*" \
            -x "composer.*" \
            -x "phpunit.xml" \
            -x "phpcs.xml.dist" \
            -x ".github/*" \
            -x ".phpunit.result.cache" \
            -x "*.zip"

      - name: Upload test artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mxroute-mailer-test-${{ github.run_id }}
          path: mxroute-mailer-test.zip
          retention-days: 30
