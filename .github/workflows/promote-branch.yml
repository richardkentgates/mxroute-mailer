name: Promote

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target branch'
        required: true
        type: choice
        options:
          - test
          - main

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate Promotion
    runs-on: ubuntu-latest
    steps:
      - name: Check source and target branches
        env:
          HEAD: ${{ github.ref_name }}
          TARGET: ${{ inputs.target }}
        run: |
          if [[ "$HEAD" == "$TARGET" ]]; then
            echo "::error::Cannot promote a branch to itself ($HEAD -> $TARGET)"
            exit 1
          fi

          case "$HEAD:$TARGET" in
            dev:test|test:main)
              echo "Promotion path is valid: $HEAD -> $TARGET"
              ;;
            *)
              echo "::error::Invalid promotion path: $HEAD -> $TARGET. Only dev -> test and test -> main are allowed."
              exit 1
              ;;
          esac

  promote:
    name: Promote and Merge
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 0

      - name: Find or create promotion PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD: ${{ github.ref_name }}
          TARGET: ${{ inputs.target }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh pr list --repo "$REPO" --head "$HEAD" --base "$TARGET" --state open --json number --jq '.[0].number')
          if [[ -n "$existing" ]]; then
            echo "number=$existing" >> "$GITHUB_OUTPUT"
            echo "Using existing PR #$existing"
          else
            pr_url=$(gh pr create \
              --repo "$REPO" \
              --head "$HEAD" \
              --base "$TARGET" \
              --title "Promote $HEAD to $TARGET" \
              --body "Automated promotion from \`$HEAD\` to \`$TARGET\`.

            **Required checks before merge:**
            - PHPCS
            - PHPUnit (PHP 7.3-8.3)")
            number=$(echo "$pr_url" | sed 's/.*\/pull\/\([0-9]*\)$/\1/')
            echo "number=$number" >> "$GITHUB_OUTPUT"
            echo "Created PR #$number"
          fi

      - name: Wait for checks and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          max_attempts=60
          sleep_seconds=30

          for ((i=1; i<=max_attempts; i++)); do
            status=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json mergeStateStatus --jq '.mergeStateStatus')
            echo "Attempt $i/$max_attempts - PR #$PR_NUMBER mergeStateStatus: $status"

            case "$status" in
              CLEAN)
                gh pr merge "$PR_NUMBER" --repo "$REPO" --merge
                echo "PR #$PR_NUMBER merged. Promotion complete."
                exit 0
                ;;
              BEHIND)
                echo "::error::PR #$PR_NUMBER is behind $TARGET. Update $HEAD and retry."
                exit 1
                ;;
              DIRTY)
                echo "::error::PR #$PR_NUMBER has merge conflicts. Resolve manually."
                exit 1
                ;;
              BLOCKED)
                echo "PR #$PR_NUMBER is blocked (checks pending or failed). Waiting..."
                ;;
              *)
                echo "PR #$PR_STATUS status: $status. Waiting..."
                ;;
            esac

            sleep "$sleep_seconds"
          done

          echo "::error::Timed out waiting for PR #$PR_NUMBER to become mergeable."
          exit 1
