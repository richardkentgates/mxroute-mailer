name: Promote

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target branch'
        required: true
        type: choice
        options:
          - test
          - main

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  validate:
    name: Validate Promotion
    runs-on: ubuntu-latest
    steps:
      - name: Check source and target branches
        env:
          HEAD: ${{ github.ref_name }}
          TARGET: ${{ inputs.target }}
        run: |
          if [[ "$HEAD" == "$TARGET" ]]; then
            echo "::error::Cannot promote a branch to itself ($HEAD -> $TARGET)"
            exit 1
          fi

          case "$HEAD:$TARGET" in
            dev:test|test:main)
              echo "Promotion path is valid: $HEAD -> $TARGET"
              ;;
            *)
              echo "::error::Invalid promotion path: $HEAD -> $TARGET. Only dev -> test and test -> main are allowed."
              exit 1
              ;;
          esac

  create-pr:
    name: Create Promotion PR
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      number: ${{ steps.pr.outputs.number }}
      head-sha: ${{ steps.pr.outputs.head-sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Find or create PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD: ${{ github.ref_name }}
          TARGET: ${{ inputs.target }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh pr list --repo "$REPO" --head "$HEAD" --base "$TARGET" --state open --json number,headRefOid --jq '.[0]')
          if [[ -n "$existing" && "$existing" != "null" ]]; then
            number=$(echo "$existing" | jq -r '.number')
            head_sha=$(echo "$existing" | jq -r '.headRefOid')
            echo "number=$number" >> "$GITHUB_OUTPUT"
            echo "head-sha=$head_sha" >> "$GITHUB_OUTPUT"
            echo "Using existing PR #$number ($head_sha)"
          else
            pr_url=$(gh pr create \
              --repo "$REPO" \
              --head "$HEAD" \
              --base "$TARGET" \
              --title "Promote $HEAD to $TARGET" \
              --body "Automated promotion from \`$HEAD\` to \`$TARGET\`.")
            number=$(echo "$pr_url" | sed 's/.*\/pull\/\([0-9]*\)$/\1/')
            pr_info=$(gh pr view "$number" --repo "$REPO" --json headRefOid --jq '.headRefOid')
            head_sha=$pr_info
            echo "number=$number" >> "$GITHUB_OUTPUT"
            echo "head-sha=$head_sha" >> "$GITHUB_OUTPUT"
            echo "Created PR #$number ($head_sha)"
          fi

  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest
    needs: create-pr
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.2'
          tools: cs2pr

      - name: Install PHPCS
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require wp-coding-standards/wpcs dealerdirect/phpcodesniffer-composer-installer phpcompatibility/phpcompatibility-wp
          echo "$(composer global config bin-dir)" >> "$GITHUB_PATH"

      - name: Run PHPCS
        id: phpcs
        run: |
          set -o pipefail
          phpcs --standard=phpcs.xml.dist --extensions=php --ignore=vendor/*,tests/* --report=checkstyle mxroute-mailer.php includes/ admin/ uninstall.php | cs2pr
        continue-on-error: true

      - name: Report PHPCS check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.create-pr.outputs.number }}
        run: |
          if [[ "${{ steps.phpcs.outcome }}" == "success" ]]; then
            gh api "repos/$REPO/check-runs" -X POST \
              -f name="PHPCS" \
              -f head_sha="${{ needs.create-pr.outputs.head-sha }}" \
              -f status=completed \
              -f conclusion=success \
              -f "output[title]=PHPCS passed" \
              -f "output[summary]=No coding standards violations found."
          else
            gh api "repos/$REPO/check-runs" -X POST \
              -f name="PHPCS" \
              -f head_sha="${{ needs.create-pr.outputs.head-sha }}" \
              -f status=completed \
              -f conclusion=failure \
              -f "output[title]=PHPCS failed" \
              -f "output[summary]=Coding standards violations found. See logs for details."
            exit 1
          fi

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: create-pr
    strategy:
      matrix:
        php: ['7.3', '7.4', '8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPUnit
        id: phpunit
        run: vendor/bin/phpunit
        continue-on-error: true

      - name: Report PHPUnit check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.create-pr.outputs.number }}
        run: |
          if [[ "${{ steps.phpunit.outcome }}" == "success" ]]; then
            gh api "repos/$REPO/check-runs" -X POST \
              -f name="PHPUnit (PHP ${{ matrix.php }})" \
              -f head_sha="${{ needs.create-pr.outputs.head-sha }}" \
              -f status=completed \
              -f conclusion=success \
              -f "output[title]=PHPUnit passed" \
              -f "output[summary]=All tests passed on PHP ${{ matrix.php }}."
          else
            gh api "repos/$REPO/check-runs" -X POST \
              -f name="PHPUnit (PHP ${{ matrix.php }})" \
              -f head_sha="${{ needs.create-pr.outputs.head-sha }}" \
              -f status=completed \
              -f conclusion=failure \
              -f "output[title]=PHPUnit failed" \
              -f "output[summary]=Tests failed on PHP ${{ matrix.php }}. See logs for details."
            exit 1
          fi

  merge:
    name: Merge Promotion PR
    runs-on: ubuntu-latest
    needs: [create-pr, phpcs, phpunit]
    steps:
      - name: Wait for PR checks and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.create-pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          max_attempts=60
          sleep_seconds=30

          for ((i=1; i<=max_attempts; i++)); do
            status=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json mergeStateStatus --jq '.mergeStateStatus')
            echo "Attempt $i/$max_attempts - PR #$PR_NUMBER mergeStateStatus: $status"

            case "$status" in
              CLEAN)
                gh pr merge "$PR_NUMBER" --repo "$REPO" --merge
                echo "PR #$PR_NUMBER merged. Promotion complete."
                exit 0
                ;;
              BEHIND)
                echo "::error::PR #$PR_NUMBER is behind target. Update source branch and retry."
                exit 1
                ;;
              DIRTY)
                echo "::error::PR #$PR_NUMBER has merge conflicts. Resolve manually."
                exit 1
                ;;
              *)
                echo "PR #$PR_NUMBER not yet mergeable. Waiting..."
                ;;
            esac

            sleep "$sleep_seconds"
          done

          echo "::error::Timed out waiting for PR #$PR_NUMBER to become mergeable."
          exit 1
