name: Promote Dev to Test

on:
  workflow_dispatch:

permissions: {}

jobs:
  create-pr:
    name: Create Promotion PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: dev
          fetch-depth: 0

      - name: Check for existing PR
        id: check
        run: |
          existing=$(gh pr list --repo "${{ github.repository }}" --head dev --base test --state open --json number --jq '.[0].number')
          echo "existing=$existing" >> "$GITHUB_OUTPUT"

      - name: Create PR dev → test
        if: steps.check.outputs.existing == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --repo "${{ github.repository }}" \
            --head dev \
            --base test \
            --title "Promote dev → test" \
            --body "Automated promotion from dev to test.

          **Checks required before merge:**
          - PHPCS passes
          - PHPUnit passes (PHP 7.3–8.3)

          This PR was created by the promotion workflow."
