name: Promote Dev to Test

on:
  workflow_dispatch:

jobs:
  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: cs2pr

      - name: Install PHPCS
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require wp-coding-standards/wpcs dealerdirect/phpcodesniffer-composer-installer phpcompatibility/phpcompatibility-wp
          echo "$(composer global config bin-dir)" >> $GITHUB_PATH

      - name: Run PHPCS
        run: phpcs --standard=phpcs.xml.dist --extensions=php --ignore=vendor/*,tests/* --report=checkstyle mxroute-mailer.php includes/ admin/ uninstall.php | cs2pr

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['7.3', '7.4', '8.0', '8.1', '8.2', '8.3']

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  promote:
    name: Promote dev → test
    runs-on: ubuntu-latest
    needs: [phpcs, phpunit]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: test
          fetch-depth: 0

      - name: Merge dev into test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/dev --no-edit

      - name: Push to test
        run: git push origin test
