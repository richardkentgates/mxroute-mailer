name: Promote to Main

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate Promotion
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        env:
          HEAD: ${{ github.ref_name }}
        run: |
          if [[ "$HEAD" != "test" ]]; then
            echo "::error::This workflow can only be run from the test branch. Current branch: $HEAD"
            exit 1
          fi
          echo "Promotion path is valid: test -> main"

  promote:
    name: Promote and Merge
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: test
          fetch-depth: 0

      - name: Find or create promotion PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh pr list --repo "$REPO" --head test --base main --state open --json number --jq '.[0].number')
          if [[ -n "$existing" && "$existing" != "null" ]]; then
            echo "number=$existing" >> "$GITHUB_OUTPUT"
            echo "Using existing PR #$existing"
          else
            pr_url=$(gh pr create \
              --repo "$REPO" \
              --head test \
              --base main \
              --title "Promote test to main" \
              --body "Automated promotion from \`test\` to \`main\`.")
            number=$(echo "$pr_url" | sed 's/.*\/pull\/\([0-9]*\)$/\1/')
            echo "number=$number" >> "$GITHUB_OUTPUT"
            echo "Created PR #$number"
          fi

      - name: Merge promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "$REPO" --merge
          echo "PR #$PR_NUMBER merged. Promotion complete."

      - name: Tag release on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main
          git checkout main
          version=$(grep -oP "Version:\\s*\\K[0-9.]+" mxroute-mailer.php | head -1)
          tag="v$version"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
          echo "Created release tag $tag"
