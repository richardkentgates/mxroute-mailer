name: Promote to Test

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate Promotion
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        env:
          HEAD: ${{ github.ref_name }}
        run: |
          if [[ "$HEAD" != "dev" ]]; then
            echo "::error::This workflow can only be run from the dev branch. Current branch: $HEAD"
            exit 1
          fi
          echo "Promotion path is valid: dev -> test"

  promote:
    name: Promote and Merge
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Find or create promotion PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          existing=$(gh pr list --repo "$REPO" --head dev --base test --state open --json number --jq '.[0].number')
          if [[ -n "$existing" && "$existing" != "null" ]]; then
            echo "number=$existing" >> "$GITHUB_OUTPUT"
            echo "Using existing PR #$existing"
          else
            pr_url=$(gh pr create \
              --repo "$REPO" \
              --head dev \
              --base test \
              --title "Promote dev to test" \
              --body "Automated promotion from \`dev\` to \`test\`.")
            number=$(echo "$pr_url" | sed 's/.*\/pull\/\([0-9]*\)$/\1/')
            echo "number=$number" >> "$GITHUB_OUTPUT"
            echo "Created PR #$number"
          fi

      - name: Merge promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "$REPO" --merge
          echo "PR #$PR_NUMBER merged. Promotion complete."

  build-test:
    name: Build Test Artifact
    runs-on: ubuntu-latest
    needs: promote
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: test

      - name: Build test zip
        run: |
          zip -r mxroute-mailer-test.zip . \
            -x ".git/*" \
            -x "tests/*" \
            -x "vendor/*" \
            -x "composer.*" \
            -x "phpunit.xml" \
            -x "phpcs.xml.dist" \
            -x ".github/*" \
            -x ".phpunit.result.cache" \
            -x "*.zip"

      - name: Upload test artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mxroute-mailer-test-${{ github.run_id }}
          path: mxroute-mailer-test.zip
          retention-days: 30
