name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build zip
        run: |
          mkdir -p /tmp/build/mxroute-mailer
          cp -r . /tmp/build/mxroute-mailer/
          rm -rf /tmp/build/mxroute-mailer/.git \
                 /tmp/build/mxroute-mailer/tests \
                 /tmp/build/mxroute-mailer/vendor \
                 /tmp/build/mxroute-mailer/.github \
                 /tmp/build/mxroute-mailer/wiki \
                 /tmp/build/mxroute-mailer/PROMOTION.md \
                 /tmp/build/mxroute-mailer/.gitignore \
                 /tmp/build/mxroute-mailer/composer.* \
                 /tmp/build/mxroute-mailer/phpunit.xml \
                 /tmp/build/mxroute-mailer/phpcs.xml.dist \
                 /tmp/build/mxroute-mailer/.phpunit.result.cache \
                 /tmp/build/mxroute-mailer/*.zip
          cd /tmp/build
          zip -r "$GITHUB_WORKSPACE/mxroute-mailer-${{ github.ref_name }}.zip" mxroute-mailer/
          cd /tmp
          rm -rf /tmp/build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: mxroute-mailer-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
