name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build zip
        run: |
          zip -r mxroute-mailer-${{ github.ref_name }}.zip . \
            -x ".git/*" \
            -x "tests/*" \
            -x "vendor/*" \
            -x "composer.*" \
            -x "phpunit.xml" \
            -x "phpcs.xml.dist" \
            -x ".github/*" \
            -x ".phpunit.result.cache" \
            -x "*.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: mxroute-mailer-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
