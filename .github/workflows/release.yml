name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build zip
        run: |
          mkdir -p build/mxroute-mailer
          cp -r . build/mxroute-mailer/
          rm -rf build/mxroute-mailer/.git \
                 build/mxroute-mailer/tests \
                 build/mxroute-mailer/vendor \
                 build/mxroute-mailer/.github \
                 build/mxroute-mailer/wiki \
                 build/mxroute-mailer/PROMOTION.md \
                 build/mxroute-mailer/.gitignore \
                 build/mxroute-mailer/composer.* \
                 build/mxroute-mailer/phpunit.xml \
                 build/mxroute-mailer/phpcs.xml.dist \
                 build/mxroute-mailer/.phpunit.result.cache \
                 build/mxroute-mailer/*.zip \
                 build/mxroute-mailer/build
          cd build
          zip -r ../mxroute-mailer-${{ github.ref_name }}.zip mxroute-mailer/
          cd ..
          rm -rf build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: mxroute-mailer-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
