name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build zip
        run: |
          mkdir -p /tmp/build/mxroute-mailer
          cp -r . /tmp/build/mxroute-mailer/
          rm -rf /tmp/build/mxroute-mailer/.git \
                 /tmp/build/mxroute-mailer/tests \
                 /tmp/build/mxroute-mailer/vendor \
                 /tmp/build/mxroute-mailer/.github \
                 /tmp/build/mxroute-mailer/wiki \
                 /tmp/build/mxroute-mailer/PROMOTION.md \
                 /tmp/build/mxroute-mailer/.gitignore \
                 /tmp/build/mxroute-mailer/composer.* \
                 /tmp/build/mxroute-mailer/phpunit.xml \
                 /tmp/build/mxroute-mailer/phpcs.xml.dist \
                 /tmp/build/mxroute-mailer/.phpunit.result.cache \
                 /tmp/build/mxroute-mailer/*.zip
          cd /tmp/build
          zip -r "$GITHUB_WORKSPACE/mxroute-mailer-${{ github.ref_name }}.zip" mxroute-mailer/
          cd /tmp
          rm -rf /tmp/build

      - name: Generate checksum
        run: |
          cd "$GITHUB_WORKSPACE"
          sha256sum "mxroute-mailer-${{ github.ref_name }}.zip" > "mxroute-mailer-${{ github.ref_name }}.zip.sha256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --generate-notes \
              "mxroute-mailer-$tag.zip" \
              "mxroute-mailer-$tag.zip.sha256"
          else
            echo "Release $tag already exists. Skipping creation."
          fi
