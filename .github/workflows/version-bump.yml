name: Auto Bump Version

on:
  push:
    branches: [ dev ]

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump patch version on dev push
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Configure Git
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git"

      - name: Bump patch version
        run: |
          current=$(grep -oP "Version:\\s*\\K[0-9]+\\.[0-9]+\\.[0-9]+" mxroute-mailer.php | head -1)
          IFS='.' read -r major minor patch <<< "$current"
          new_patch=$((patch + 1))
          new_version="$major.$minor.$new_patch"

          sed -i "s/Version: $current/Version: $new_version/" mxroute-mailer.php
          sed -i "s/define( 'MXROUTE_MAILER_VERSION', '$current' )/define( 'MXROUTE_MAILER_VERSION', '$new_version' )/" mxroute-mailer.php

          git add mxroute-mailer.php
          git commit -m "chore: bump version to $new_version [version] [skip ci]"
          git push origin dev
